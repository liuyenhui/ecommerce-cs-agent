        cost_by_currency:
          type: object
          additionalProperties: {type: integer, minimum: 0}
          description: ISO 币种到微单位金额；当前支持 CNY 和 USD。
        p95_latency_ms: {type: [number, "null"], minimum: 0}
        error_rate: {type: [number, "null"], minimum: 0, maximum: 1}
        fallback_rate: {type: [number, "null"], minimum: 0, maximum: 1}

    LlmUsageTimeseriesPoint:
      type: object
