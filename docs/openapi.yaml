          type: string
          description: 外部 SKU ID 或规格编码；可用于解析内部 product_sku_id。
        billing_lease:
          type: string
          description: Connector Token 调用必填。由外部计费权威签发，绑定 connector_id、reservation_id、request_id、platform、external_store_id、feature=ai_cs.reply_decision 和 exp；API Key 调用可按接入策略省略。
        message:
          $ref: "#/components/schemas/IncomingMessage"
        conversation:
          $ref: "#/components/schemas/ConversationContext"
        mode:
          $ref: "#/components/schemas/DecisionMode"
        context:
          $ref: "#/components/schemas/InitialContext"
        metadata:
          $ref: "#/components/schemas/Metadata"

    ReplyDecisionResponse:
      type: object
      required: [decision_id, decision_status, action, candidates, context_requests, action_requests, confidence, risk_level, risk_flags, missing_context, trace]
      properties:
