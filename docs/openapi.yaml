    SystemOrganization:
      type: object
      required: [id, organization_id, name, status, metadata, external_ref, contact, created_at]
      properties:
        id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [active, suspended, onboarding, frozen]
        metadata:
          $ref: "#/components/schemas/Metadata"
        external_ref:
          type: string
        contact:
          $ref: "#/components/schemas/Metadata"
        created_at:
          type: string
          format: date-time

    SystemStore:
      type: object
      required: [id, store_id, organization_id, name, platform, status, metadata, external_store_id, readiness_status, created_at]
      properties:
        id:
          type: string
        store_id:
          type: string
        organization_id:
          type: string
        name:
          type: string
        platform:
          $ref: "#/components/schemas/Platform"
        status:
          type: string
          enum: [active, inactive, onboarding, frozen]
        metadata:
          $ref: "#/components/schemas/Metadata"
        external_store_id:
          type: string
        readiness_status:
          type: string
          enum: [ready, warning, blocked, unknown]
        created_at:
          type: string
          format: date-time

    SystemStoreReadinessSummary:
      type: object
      required: [organization_id, store_id, status, checks, updated_at]
      properties:
        organization_id:
          type: string
        store_id:
          type: string
        status:
          type: string
          enum: [ready, warning, blocked]
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ReadinessCheck"
        updated_at:
          type: string
          format: date-time

    ReadinessCheck:
      type: object
      required: [code, status, message]
      properties:
        code:
          type: string
          enum: [product_content, price_snapshot, knowledge_review, api_integration]
        status:
          type: string
          enum: [pass, warning, blocked]
        message:
          type: string

    SystemMessageTraceSummary:
      type: object
      required: [decision_id, organization_id, store_id, action, risk_level, created_at]
      properties:
        decision_id:
          type: string
        organization_id:
          type: string
        store_id:
          type: string
        request_id:
          type: string
        external_message_id:
          type:
            - string
            - "null"
        action:
          $ref: "#/components/schemas/DecisionAction"
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        status:
          $ref: "#/components/schemas/DecisionStatus"
        sensitive_access:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time

    BackgroundTask:
      type: object
      required: [task_id, task_type, status, organization_id, retryable, created_at]
      properties:
        task_id:
          type: string
        task_type:
          type: string
          enum: [asset_parse, markdown_convert, knowledge_extract, embedding, bulk_import, eval_run]
        status:
          type: string
          enum: [queued, running, succeeded, failed, retrying, canceled]
        retryable:
          type: boolean
          description: 服务端持久化的幂等安全重试能力；客户端不得从任务状态或类型推断。
        organization_id:
          type: string
        store_id:
          type:
            - string
            - "null"
        input_ref:
          type: string
        output_ref:
          type:
            - string
            - "null"
        error_summary:
          type:
            - string
            - "null"
        retry_count:
          type: integer
          minimum: 0
        next_retry_at:
          type:
            - string
            - "null"
          format: date-time
        created_at:
          type: string
          format: date-time

    AuditLog:
      type: object
      required: [audit_log_id, object_type, object_id, action, sensitive_access, created_at]
      properties:
        audit_log_id:
          type: string
        actor_admin_user_id:
          type:
            - string
            - "null"
          description: 客户 Admin 操作者 ID。
        actor_system_user_id:
          type:
            - string
            - "null"
          description: 系统 Admin 操作者 ID。
        organization_id:
          type:
            - string
            - "null"
        store_id:
          type:
            - string
            - "null"
        object_type:
          type: string
        object_id:
          type: string
        action:
          type: string
        reason:
          type:
            - string
            - "null"
        diff_summary:
          type:
            - object
            - "null"
          additionalProperties: true
        sensitive_access:
          type: boolean
        created_at:
          type: string
          format: date-time

    HealthDependency:
      type: object
      required: [name, status, message, checked_at]
      properties:
        name:
          type: string
          enum: [api, postgresql, pgvector, queue]
        status:
          type: string
          enum: [healthy, degraded, unhealthy, not_configured]
        message:
          type: string
        checked_at:
          type: string
          format: date-time

    PageInfo:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
          minimum: 1
        page_size:
          type: integer
          minimum: 1
          maximum: 100
        total:
          type: integer
          minimum: 0

    AdminRole:
      type: string
      enum: [owner, admin, store_admin, content_operator, knowledge_reviewer, rule_operator, auditor]

    SystemAdminRole:
      type: string
      enum: [super_admin, platform_operator, technical_support, rule_admin, security_auditor, release_admin]

    ProductSku:
      type: object
      properties:
        external_sku_id:
          type: string
        sku_code:
          type: string
        spec:
          $ref: "#/components/schemas/Metadata"
        attributes:
          $ref: "#/components/schemas/Metadata"
        status:
          type: string
          enum: [active, inactive, archived]

    FeedbackLabel:
      type: object
      required: [label_type, label_value]
      properties:
        label_type:
          type: string
        label_value:
          type: string
        reason:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        detail:
          type: string
          description: 面向调用方的安全错误摘要；不得包含凭据、数据库错误或 raw payload。
        errorId:
          type: string
          description: 稳定错误编号；仅已登记链路保证返回，例如 ECS-OE-001。
        error:
          $ref: "#/components/schemas/ErrorDetail"
        request_id:
          type: string
        decision_id:
          type:
            - string
            - "null"

    ErrorDetail:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          minLength: 1
          description: 稳定机器可读错误码；由各接口和服务能力扩展，不使用会漂移的全局封闭枚举。
          examples: [validation_error, stale_revision, provider_not_found, release_gate_failed]
        message:
          type: string
        errorId:
          type: string
          description: 与顶层 `errorId` 相同；便于只解析 `error` 对象的客户端定位。
        details:
          description: 业务错误可返回键值对象；请求校验错误返回 Pydantic 风格的安全问题数组，敏感 input 可以省略。
          oneOf:
            - $ref: "#/components/schemas/Metadata"
            - type: array
              items:
                $ref: "#/components/schemas/ValidationIssue"

    ValidationIssue:
      type: object
      additionalProperties: true
      required: [type, loc, msg]
      properties:
        type:
          type: string
          minLength: 1
          examples: [extra_forbidden]
        loc:
          type: array
          minItems: 1
          items:
            type: [string, integer]
          examples: [[body, field_name]]
        msg:
          type: string
          minLength: 1
          examples: [Extra inputs are not permitted]
        input:
          description: 可选的安全输入摘要；服务端会对可能含敏感内容的请求省略该字段。
        ctx:
          type: object
          additionalProperties: true
        url:
          type: string

    Platform:
      type: string
      description: 平台标识；可随接入平台扩展，标准字段保持稳定。
      examples: [pdd]

    DecisionMode:
      type: string
      enum: [assist_first, auto_when_safe]

    DecisionStatus:
      type: string
      enum: [received, queued, running, waiting_context, partial_context, ready_to_decide, answer_ready, candidate, action_request, handoff, completed, failed, retrying, canceled]

    DecisionAction:
      type: string
      enum: [auto_reply, candidate, handoff, context_request, action_request]

    ContextType:
      type: string
      enum: [products, orders, logistics, rules]

    RiskLevel:
      type: string
      enum: [low, medium, high]

    ActionResultStatus:
      type: string
      enum: [succeeded, failed, timeout, rejected]

    AsyncTaskStatus:
      type: string
      enum: [queued, running, waiting_context, completed, failed, retrying, canceled, dead_lettered]

    WebhookEventType:
      type: string
      enum: [reply_decision.completed, reply_decision.failed, knowledge_entry.created, feedback.processed]

    WebhookSigningAlgorithm:
      type: string
      enum: [hmac-sha256]
      description: 使用订阅 secret 对 `{timestamp}.{event_id}.{raw_body_sha256}` 计算 HMAC-SHA256，放入 `X-Agent-Signature`。

    WebhookSubscriptionStatus:
      type: string
      enum: [active, paused, disabled, deleted]

    ConnectorStatus:
      type: string
      enum: [draft, active, paused, disabled]

    RuleReleaseStatus:
      type: string
      enum: [draft, dry_run_passed, canary, active, paused, rolled_back, archived]

    Metadata:
      type: object
      additionalProperties: true
