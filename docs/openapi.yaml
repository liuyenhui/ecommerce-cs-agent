openapi: 3.1.0
info:
  title: 电商客服 Agent API 契约
  version: 0.1.0
  summary: 第一版外部决策、补上下文、人工反馈、客户 Admin 和系统 Admin 核心接口。
  description: |
    本契约从 `docs/http-api-design.md`、`docs/customer-admin-design.md` 和 `docs/system-admin-design.md` 抽出，覆盖第一版主链路、客户 Admin、系统 Admin 和商品资料核心接口。
    外部系统通过 `/v1/reply-decisions` 创建决策，按 `context_requests[]` 回填商品、订单、物流、规则上下文，并通过 `actions/results` 回传外部动作结果。
    `decision_id` 是外部 API 主键，同时映射内部 LangGraph `thread_id`；`graph_version` 必须写入 trace 和 checkpoint，便于旧决策回放。

    鉴权域必须隔离：外部系统 API token 只能调用外部决策接口，客户 Admin session 只能调用 `/v1/admin/*` 和客户可见追踪接口，系统 Admin session 只能调用 `/v1/system-admin/*`。三类凭据不能混用。
    客户 Admin Web 与系统 Admin Web 必须使用不同站点、登录页、Cookie / session 名和路由守卫；客户后台 session 建议命名为 `agent_admin_session`，系统后台 session 建议命名为 `agent_system_admin_session`。
servers:
  - url: https://api.example.com
    description: 生产或 dev 环境 API 域名占位，实际部署以环境配置为准。
tags:
  - name: Open ERP Integrations
    description: open_erp_agent 无感开通的服务间 provisioning、connector token 和暂停/轮换契约。
  - name: Reply Decisions
    description: 外部客服系统调用的同步决策、补上下文和动作结果闭环。
  - name: Message Traces
    description: 面向客服运营、技术排障和审计的单条消息处理过程查询。
  - name: Feedback
    description: 人工客服最终处理结果和候选采用情况回传。
  - name: Async Tasks
    description: 后续异步消息事件入口和外部系统轮询任务状态。
  - name: Webhooks
    description: 后续外部系统订阅决策、知识和反馈事件的回调契约。
  - name: Admin Auth
    description: 客户 Admin 自有登录态，只服务客户后台站点，不接受外部系统 API Key 或系统 Admin session 直接调用。
  - name: Admin Context
    description: 客户 Admin 租户和店铺上下文。
  - name: Admin Connectors
    description: 后续客户 Admin 维护店铺 Connector 主动查询能力声明。
  - name: Admin Rule Releases
    description: 后续客户 Admin 维护规则版本、灰度发布、回滚和 dry-run。
  - name: Product Content
    description: 商品资料、素材、Markdown 审稿稿件、知识候选审核和价格快照维护。
  - name: System Admin
    description: 系统后台字段级契约，覆盖租户、店铺、readiness、排障、任务、审计和健康；使用系统后台独立 session。
  - name: System Admin LLM Governance
    description: 系统后台 LLM Provider、草稿路由、验证发布、回滚和真实调用成本统计；只保存 Kubernetes Secret 引用。

paths:
  /v1/integrations/open-erp/provision:
    post:
      tags: [Open ERP Integrations]
      operationId: provisionOpenErpConnector
      summary: 幂等开通 open_erp AI 客服 Connector
      description: |
        服务间接口，只接受 open_erp integration Bearer Token，不接受微信 session、ERP client token、Cookie、Customer Admin session 或 System Admin session。
        幂等创建或更新内部 tenant/store/platform_account/connector 映射；首次创建或显式轮换时一次性返回 connector_token，数据库只保存 token hash/prefix。
      security:
        - OpenErpIntegrationAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenErpProvisionRequest"
      responses:
        "201":
          description: Connector 首次创建或已存在的幂等映射。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenErpProvisionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/integrations/open-erp/connectors/{connector_id}:
    patch:
      tags: [Open ERP Integrations]
      operationId: patchOpenErpConnector
      summary: 暂停、恢复或轮换 open_erp Connector
      description: Connector 暂停后不能调用决策接口；轮换时只返回一次新 connector_token，后续查询只返回 prefix。
      security:
        - OpenErpIntegrationAuth: []
      parameters:
        - name: connector_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenErpConnectorPatchRequest"
      responses:
        "200":
          description: Connector 状态已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenErpProvisionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/integrations/open-erp/admin-launch-tickets:
    post:
      tags: [Open ERP Integrations]
      operationId: issueOpenErpAdminLaunchTicket
      summary: 签发 Customer Admin 一次性启动票据
      description: 仅供已登记的 open_erp 服务端调用。校验外部店铺已绑定 active Connector 后，返回 60-120 秒内一次性可兑换的 launch_token。
      security:
        - OpenErpIntegrationAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OpenErpAdminLaunchTicketRequest"
      responses:
        "201":
          description: 启动票据已签发。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenErpAdminLaunchTicketResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions:
    post:
      tags: [Reply Decisions]
      operationId: createReplyDecision
      summary: 创建回复决策
      description: |
        外部客服系统唯一同步问答入口。请求必须带 `request_id` 作为幂等键。
        外部请求不传内部 `tenant_id`；服务端通过 API Key / Connector Token 授权范围，以及 `platform`、`external_store_id` / `platform_account_ref`、`listing_ref` / 商品外部引用解析内部租户、店铺、平台账号和商品上下文。
        商品、订单、物流和规则上下文可选；缺关键上下文时返回 `context_requests[]`，客户端按类型并行回填。
      security:
        - AgentApiAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplyDecisionCreateRequest"
            examples:
              waitingContext:
                summary: 缺订单和物流上下文
                value:
                  request_id: external-idempotency-key
                  platform: pdd
                  external_store_id: pdd-store-001
                  platform_account_ref: pdd-account-main
                  listing_ref: pdd-listing-001
                  external_product_id: pdd-product-001
                  external_sku_id: pdd-sku-001
                  billing_lease: base64url-payload.base64url-signature
                  message:
                    external_message_id: msg-001
                    sender_type: buyer
                    content: 这个订单什么时候发货？
                    sent_at: "2026-06-12T10:15:00+08:00"
                  conversation:
                    external_conversation_id: conv-001
                    buyer_ref: buyer-hash-001
                    messages: []
                  mode: assist_first
                  context:
                    products: []
                    orders: []
                    logistics: []
                    rules: []
      responses:
        "200":
          description: 决策已生成，可能是候选、自动回复、转人工、补上下文或动作请求。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReplyDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions/{decision_id}/contexts/products:
    post:
      tags: [Reply Decisions]
      operationId: refillProductContexts
      summary: 回填商品上下文
      description: 按 `context_requests[type=products]` 回填商品快照或商品引用。服务端用 `decision_id + context_request_id + idempotency_key` 聚合和去重，从持久化 DecisionState 重构同一 thread_id 的输入后重算；Connector Token scope 必须与原决策租户和店铺一致。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductContextRefillRequest"
      responses:
        "200":
          $ref: "#/components/responses/ContextRefillAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions/{decision_id}/contexts/orders:
    post:
      tags: [Reply Decisions]
      operationId: refillOrderContexts
      summary: 回填订单上下文
      description: 按 `context_requests[type=orders]` 回填订单快照。订单上下文优先使用订单状态更新时间、物流更新时间和支付时间判断最近有效项。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderContextRefillRequest"
      responses:
        "200":
          $ref: "#/components/responses/ContextRefillAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions/{decision_id}/contexts/logistics:
    post:
      tags: [Reply Decisions]
      operationId: refillLogisticsContexts
      summary: 回填物流上下文
      description: 回填物流、仓库或发货状态。物流缺失、过期或查询失败时不能让模型猜测，应降级为候选或转人工并写入 trace。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogisticsContextRefillRequest"
      responses:
        "200":
          $ref: "#/components/responses/ContextRefillAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions/{decision_id}/contexts/rules:
    post:
      tags: [Reply Decisions]
      operationId: refillRuleContexts
      summary: 回填规则上下文
      description: 回填店铺规则、平台规则或风控策略。规则选择优先看 `effective_at` 或版本生效时间，并在 trace 中记录命中规则和降级原因。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleContextRefillRequest"
      responses:
        "200":
          $ref: "#/components/responses/ContextRefillAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/reply-decisions/{decision_id}/actions/results:
    post:
      tags: [Reply Decisions]
      operationId: submitActionResult
      summary: 回传外部动作执行结果
      description: 外部系统执行自己的真实业务 API 后回传结果。Connector Token scope 必须与原决策租户和店铺一致，action_id 和 action_type 必须匹配已规划动作；没有成功结果前，Agent 不能向买家确认动作已完成。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionResultRequest"
      responses:
        "200":
          description: 动作结果已接收并推进同一决策。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionResultResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/message-traces/{decision_id}:
    get:
      tags: [Message Traces]
      operationId: getMessageTrace
      summary: 查询单条消息 Agent 处理过程
      description: 面向客服运营、技术排障和审计，默认只返回摘要、引用 ID、命中原因和审计元数据；完整 raw payload 只允许内部排障权限读取。
      security:
        - AdminSession: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
        - name: message_id
          in: query
          required: false
          schema:
            type: string
          description: 外部系统只有内部消息 ID 时可辅助定位。
        - name: external_message_id
          in: query
          required: false
          schema:
            type: string
          description: 平台原始消息 ID。
        - name: request_id
          in: query
          required: false
          schema:
            type: string
          description: 创建决策时的外部幂等键。
      responses:
        "200":
          description: 单条消息完整处理过程。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageTraceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/feedback/human-replies:
    post:
      tags: [Feedback]
      operationId: submitHumanReplyFeedback
      summary: 提交人工回复反馈
      description: 记录人工最终回复、是否采用候选、修改幅度、处理结果和后续学习信号。Connector Token scope 必须与原决策租户和店铺一致；人工回复不会自动进入向量库，必须经过知识候选和审核流程。
      security:
        - AgentApiAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HumanReplyFeedbackRequest"
      responses:
        "200":
          description: 人工反馈已记录。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HumanReplyFeedbackResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/events/messages:
    post:
      tags: [Async Tasks]
      operationId: createMessageEventTask
      summary: 提交异步消息事件
      description: |
        后续异步入口。外部系统用同一个 `request_id` 做幂等提交，服务端返回 `task_id` 供轮询；若轻量入队阶段已经创建决策，也返回 `decision_id`。
        第一版仍以 `POST /v1/reply-decisions` 同步主链路和 `context_requests[]` 回填为主，本接口只作为高并发或长耗时流程的后续能力契约。
      security:
        - AgentApiAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageEventCreateRequest"
      responses:
        "202":
          description: 消息事件已接收并创建异步任务。
          headers:
            Location:
              description: 任务轮询地址。
              schema:
                type: string
                examples: ["/v1/tasks/task-001"]
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncTaskAcceptedResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /v1/tasks/{task_id}:
    get:
      tags: [Async Tasks]
      operationId: getExternalTask
      summary: 轮询异步任务状态
      description: 外部系统按 `task_id` 轮询异步消息处理进度。响应必须返回任务状态、关联 `request_id`、可选 `decision_id`、失败 / 重试信息和 trace 引用，不返回完整 raw payload。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: 异步任务当前状态。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AsyncTaskStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/webhook-subscriptions:
    post:
      tags: [Webhooks]
      operationId: createWebhookSubscription
      summary: 创建 Webhook 订阅
      description: 外部系统注册回调地址。secret 只在创建或轮换时一次性返回，后续查询不得返回明文。
      security:
        - AgentApiAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookSubscriptionCreateRequest"
      responses:
        "201":
          description: Webhook 订阅已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionCreateResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
    get:
      tags: [Webhooks]
      operationId: listWebhookSubscriptions
      summary: 查询 Webhook 订阅
      description: 按当前外部系统 API token 可访问的租户 / 店铺范围查询订阅列表，响应只返回 secret 摘要。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/TenantIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: event_type
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/WebhookEventType"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: Webhook 订阅分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/webhook-subscriptions/{subscription_id}:
    patch:
      tags: [Webhooks]
      operationId: updateWebhookSubscription
      summary: 更新 Webhook 订阅
      description: 更新事件类型、回调地址、状态、重试策略或轮换 secret。所有更新必须带 `reason` 并写审计。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookSubscriptionUpdateRequest"
      responses:
        "200":
          description: Webhook 订阅已更新。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookSubscriptionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"
    delete:
      tags: [Webhooks]
      operationId: deleteWebhookSubscription
      summary: 删除 Webhook 订阅
      description: 逻辑删除或禁用订阅。服务端应停止后续投递，但保留历史投递和死信记录用于审计。
      security:
        - AgentApiAuth: []
      parameters:
        - $ref: "#/components/parameters/SubscriptionId"
      responses:
        "204":
          description: Webhook 订阅已删除或禁用。
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /v1/admin/auth/login:
    post:
      tags: [Admin Auth]
      operationId: adminLogin
      summary: 客户 Admin 登录
      description: Agent 自有客户 Admin 登录。成功后建立客户后台专用 HttpOnly Cookie 或等价安全 session，建议 Cookie 名为 `agent_admin_session`；session 状态必须保存在数据库、Redis 或等价外部存储。系统 Admin session 和外部系统 API token 不能调用客户 Admin API。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginRequest"
      responses:
        "200":
          description: 登录成功并返回当前用户摘要。
          headers:
            Set-Cookie:
              description: HttpOnly 客户后台 session cookie，建议名为 `agent_admin_session`；文档不记录实际值。
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/admin/auth/logout:
    post:
      tags: [Admin Auth]
      operationId: adminLogout
      summary: 客户 Admin 退出登录
      description: 失效当前 Admin session，并记录安全审计事件。
      security:
        - AdminSession: []
      responses:
        "204":
          description: 已退出登录，无响应体。
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/admin/auth/launch/exchange:
    post:
      tags: [Admin Auth]
      operationId: exchangeAdminLaunchToken
      summary: 兑换 Customer Admin 一次性启动票据
      description: open_erp_agent 客户端打开 `/launch?token=...` 后由 Customer Admin 调用。成功后只建立 Agent 自有 `agent_admin_session`，不读取或复用微信、PDD、ERP Cookie。
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLaunchExchangeRequest"
      responses:
        "200":
          description: 兑换成功并设置客户后台 session。
          headers:
            Set-Cookie:
              description: HttpOnly 客户后台 session cookie，建议名为 `agent_admin_session`。
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "410":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/admin/auth/oidc/start:
    get:
      tags: [Admin Auth]
      operationId: adminOidcStart
      summary: 发起客户 Admin Fcihome Account OIDC 登录
      description: |
        Fcihome Account OIDC 预留入口。当前客户 Admin 登录页的外部入口优先使用 open_erp_agent 微信授权桥接；本接口创建短期 OIDC state / PKCE cookie 并重定向到 Fcihome Account，不会创建租户、店铺或权限，也不会设置系统后台 Cookie。
      security: []
      responses:
        "307":
          description: 重定向到 Fcihome Account 授权端点。
          headers:
            Location:
              description: Fcihome Account 授权 URL。
              schema:
                type: string
            Set-Cookie:
              description: 短期 HttpOnly OIDC state cookie，文档不记录实际值。
              schema:
                type: string
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /v1/admin/auth/oidc/callback:
    get:
      tags: [Admin Auth]
      operationId: adminOidcCallback
      summary: 处理客户 Admin Fcihome Account OIDC 回调
      description: |
        校验 state / PKCE 后用 OIDC 只确认账号身份。已绑定 `fcihome_account_sub` 的 active admin_user 可直接登录；未绑定时，仅当 OIDC email 精确匹配唯一 active admin_user 才允许绑定并写审计。失败时重定向回客户登录页并带明确错误码。
      security: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
          description: OIDC 授权码；不得写入审计日志。
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: OIDC state；用于和 HttpOnly state cookie 校验。
      responses:
        "307":
          description: 登录成功跳转 `/admin`，失败跳转 `/login?error=...`。
          headers:
            Location:
              schema:
                type: string
            Set-Cookie:
              description: 成功时设置 `agent_admin_session`，失败时删除 OIDC state cookie；不会设置 `agent_system_admin_session`。
              schema:
                type: string
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/admin/auth/oidc/link:
    post:
      tags: [Admin Auth]
      operationId: adminOidcLink
      summary: 为当前客户 Admin 绑定 Fcihome Account
      description: 当前客户 Admin session 下，用已校验的 OIDC code / state 换取 Fcihome Account 身份后绑定 subject。绑定只写 `admin_user.fcihome_account_sub` 和审计，不创建租户、店铺或权限。
      security:
        - AdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminOidcLinkRequest"
      responses:
        "200":
          description: 绑定成功并返回当前用户摘要。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/admin/auth/me:
