        action_requests:
          type: array
          items:
            $ref: "#/components/schemas/ActionRequest"
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        risk_flags:
          type: array
          items:
            type: string
        missing_context:
          type: array
          items:
            $ref: "#/components/schemas/ContextType"
        handoff_reason:
          type:
            - string
            - "null"
        trace:
          $ref: "#/components/schemas/DecisionTrace"

