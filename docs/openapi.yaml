  /v1/system-admin/audit-logs:
    get:
      tags: [System Admin]
      operationId: listSystemAuditLogs
      summary: 查询系统后台审计日志
      description: 查询系统后台登录、权限变更、跨组织访问、代运营修改、敏感数据查看和高风险变更。时间范围采用 `[time_from, time_to)` 半开区间；起止时间必须含时区且起点早于终点。
      security:
        - SystemAdminSession: []
      parameters:
        - name: organization_id
          in: query
          required: false
          schema: {type: string, maxLength: 256}
          description: Agent 组织 ID，按精确值筛选。
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: actor_user_id
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 256
          description: 审计动作精确值，例如 `system_admin.release.publish`。
        - name: action_prefix
          in: query
          required: false
          schema:
            type: string
            minLength: 1
            maxLength: 256
            pattern: "^[^%_\\\\]+$"
          description: 审计动作安全前缀，例如 `llm.`；服务端在 total 和分页前过滤，不接受 SQL 通配符。
        - name: sensitive_access
          in: query
          required: false
          schema:
            type: boolean
        - name: time_from
          in: query
          required: false
          schema: {type: string, format: date-time}
          description: 创建时间起点，含时区，闭区间。
        - name: time_to
          in: query
          required: false
          schema: {type: string, format: date-time}
          description: 创建时间终点，含时区，开区间。
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 系统后台审计分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
              example:
                items:
                  - audit_log_id: audit-example
                    actor_system_user_id: sysadmin-example
                    organization_id: org-example
                    store_id: store-example
                    object_type: llm_release
                    object_id: release-example
                    action: system_admin.release.publish
                    reason: approved rollout
                    sensitive_access: false
                    created_at: "2026-07-15T08:00:00Z"
                page_info: {page: 1, page_size: 20, total: 1}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

