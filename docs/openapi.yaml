                $ref: "#/components/schemas/SystemOrganizationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [System Admin]
      operationId: createSystemOrganization
      summary: 创建租户组织
      description: 平台运营或更高权限创建组织；必须记录开通原因和审计。
      security:
        - SystemAdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemOrganizationCreateRequest"
      responses:
        "201":
          description: 租户组织已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemOrganizationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/system-admin/stores:
    get:
      tags: [System Admin]
      operationId: listSystemStores
      summary: 查询跨租户店铺
      description: 系统后台按组织、店铺、平台、状态和时间查询店铺；跨租户访问写入审计。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 店铺分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStoreListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [System Admin]
      operationId: createSystemStore
      summary: 创建店铺
      description: 为指定组织创建店铺、平台类型和外部引用；必须写入系统审计。
      security:
        - SystemAdminSession: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SystemStoreCreateRequest"
      responses:
        "201":
          description: 店铺已创建。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStoreResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/system-admin/readiness/stores:
    get:
      tags: [System Admin]
      operationId: listSystemStoreReadiness
      summary: 查询店铺上线完成度
      description: 跨租户查看资料、知识、规则、动作能力和 API 接入检查项；默认返回摘要，不返回客户业务敏感 payload。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 店铺上线完成度分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/system-admin/message-traces:
    get:
      tags: [System Admin]
      operationId: listSystemMessageTraces
      summary: 跨租户查询消息决策追踪
      description: 技术支持按 `decision_id`、请求 ID、外部消息 ID、组织、店铺、平台和时间查询摘要。请求 raw payload 必须带 `reason`，并可能返回 `RAW_PAYLOAD_ACCESS_DENIED`。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: decision_id
          in: query
          required: false
          schema:
            type: string
        - name: external_message_id
          in: query
          required: false
          schema:
            type: string
        - name: trace_id
          in: query
          required: false
          schema:
            type: string
          description: Trace step ID 或运行时 trace 内部 step_id，用于定位具体图节点。
        - name: include_raw_payload
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 是否申请查看 raw payload；需要 `trace:raw_payload:read` 专门能力且必须提供 `reason`。
        - name: reason
          in: query
          required: false
          schema:
            type: string
          description: 跨租户排障、敏感字段查看或 raw payload 访问原因。
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 消息决策追踪分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMessageTraceListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/system-admin/message-traces/{decision_id}:
    get:
      tags: [System Admin]
      operationId: getSystemMessageTrace
      summary: 查询系统后台消息决策详情
      description: 系统后台查看单条消息决策详情。跨租户访问、敏感字段查看和 raw payload 访问必须写系统审计。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/DecisionId"
        - name: include_raw_payload
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: reason
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 单条系统后台消息追踪详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMessageTraceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/system-admin/tasks:
    get:
      tags: [System Admin]
      operationId: listSystemTasks
      summary: 查询异步任务
      description: 查询资料解析、Markdown 转换、知识抽取、embedding、批量导入、评测等任务状态。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: task_type
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 异步任务分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/system-admin/tasks/{task_id}/retry:
    post:
      tags: [System Admin]
      operationId: retrySystemTask
      summary: 重试幂等安全任务
      description: 仅允许重试幂等安全任务；必须提供 `reason` 和 `idempotency_key`，并写入系统审计。
      security:
        - SystemAdminSession: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
          description: 后台任务 ID。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskRetryRequest"
      responses:
        "202":
          description: 任务重试已入队。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskRetryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/IdempotencyConflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /v1/system-admin/audit-logs:
    get:
      tags: [System Admin]
      operationId: listSystemAuditLogs
      summary: 查询系统后台审计日志
      description: 查询系统后台登录、权限变更、跨租户访问、代运营修改、敏感数据查看和高风险变更。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/OrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: actor_user_id
          in: query
          required: false
          schema:
            type: string
        - name: sensitive_access
          in: query
          required: false
          schema:
            type: boolean
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
        "200":
          description: 系统后台审计分页列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /v1/system-admin/health:
    get:
      tags: [System Admin]
      operationId: getSystemHealth
      summary: 查询系统健康
      description: 汇总 API、Worker、PostgreSQL、Redis、对象存储、pgvector、队列、K8s deployment 和 ingress 健康。
      security:
        - SystemAdminSession: []
      responses:
        "200":
          description: 系统健康摘要。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemHealthResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    AgentApiAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key or Bearer Token
      description: 外部系统接入凭据，只能调用外部决策、补上下文、动作结果和反馈接口，不能调用客户 Admin 或系统 Admin API。
    AdminSession:
      type: apiKey
      in: cookie
      name: agent_admin_session
      description: 客户 Admin HttpOnly session cookie。session 状态必须落外部持久化存储，不能依赖单容器内存。
    SystemAdminSession:
      type: apiKey
      in: cookie
      name: agent_system_admin_session
      description: 系统 Admin HttpOnly session cookie。不能用于客户 Admin 或外部系统 API。

  parameters:
    DecisionId:
      name: decision_id
      in: path
      required: true
      schema:
        type: string
      description: Agent 决策 ID；同时映射内部 LangGraph `thread_id`。
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
      description: 异步任务 ID。
    SubscriptionId:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
      description: Webhook 订阅 ID。
    ConnectorId:
      name: connector_id
      in: path
      required: true
      schema:
        type: string
      description: Connector 配置 ID。
    RuleSetId:
      name: rule_set_id
      in: path
      required: true
      schema:
        type: string
      description: 规则版本集合 ID。
    OrganizationIdQuery:
      name: organization_id
      in: query
      required: false
      schema:
        type: string
      description: 组织 ID。客户 Admin 查询时必须属于当前 session 可访问范围；系统 Admin 跨租户查询会写访问审计。
    StoreIdQuery:
      name: store_id
      in: query
      required: false
      schema:
        type: string
      description: 店铺 ID。与 `organization_id` 同时提供时必须匹配。
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
      description: 状态筛选，枚举值由对应资源定义。
    RoleQuery:
      name: role
      in: query
      required: false
      schema:
        type: string
      description: 角色筛选。
    TimeFrom:
      name: created_at_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: 创建时间起点，闭区间。
    TimeTo:
      name: created_at_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: 创建时间终点，闭区间。
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 统一页码分页参数，从 1 开始。
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 统一每页数量，默认 20，最大 100。

  responses:
    ContextRefillAccepted:
      description: 上下文已接收并聚合同一决策。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContextRefillResponse"
    BadRequest:
      description: 请求格式错误或业务前置条件不满足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未登录、凭据缺失或凭据无效。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已认证但没有访问当前组织、店铺、角色或排障数据的权限。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在或不属于当前组织 / 店铺上下文。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    IdempotencyConflict:
      description: 幂等键重复但请求载荷与首次请求不一致。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 资源状态冲突、唯一约束冲突或业务版本冲突。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 字段校验失败。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ObjectStorageUnavailable:
      description: 对象存储暂不可用；服务端不得回显底层凭据、临时 URL 或完整文件内容。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: 请求过于频繁或触发登录 / API 限流。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: 服务端内部错误。响应不得包含密钥、请求头、Cookie 或完整 raw payload。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ReplyDecisionCreateRequest:
      type: object
      required: [request_id, organization_id, store_id, platform, message, conversation, mode]
      properties:
        request_id:
          type: string
          description: 外部请求幂等键。
        organization_id:
          type: string
          description: 租户组织 ID。
        store_id:
          type: string
          description: 店铺 ID。
        platform:
          $ref: "#/components/schemas/Platform"
        message:
          $ref: "#/components/schemas/IncomingMessage"
        conversation:
          $ref: "#/components/schemas/ConversationContext"
        mode:
          $ref: "#/components/schemas/DecisionMode"
        context:
          $ref: "#/components/schemas/InitialContext"
        metadata:
          $ref: "#/components/schemas/Metadata"

    ReplyDecisionResponse:
      type: object
      required: [decision_id, decision_status, action, candidates, context_requests, action_requests, confidence, risk_level, risk_flags, missing_context, trace]
      properties:
        decision_id:
          type: string
        decision_status:
          $ref: "#/components/schemas/DecisionStatus"
        action:
          $ref: "#/components/schemas/DecisionAction"
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/CandidateReply"
        auto_reply:
          anyOf:
            - $ref: "#/components/schemas/AutoReply"
            - type: "null"
        context_requests:
          type: array
          items:
            $ref: "#/components/schemas/ContextRequest"
        action_requests:
          type: array
          items:
            $ref: "#/components/schemas/ActionRequest"
        confidence:
          type: number
          format: double
          minimum: 0
          maximum: 1
        risk_level:
          $ref: "#/components/schemas/RiskLevel"
        risk_flags:
          type: array
          items:
            type: string
        missing_context:
          type: array
          items:
            $ref: "#/components/schemas/ContextType"
        handoff_reason:
          type:
            - string
            - "null"
        trace:
          $ref: "#/components/schemas/DecisionTrace"

    IncomingMessage:
      type: object
      required: [external_message_id, sender_type, content, sent_at]
      properties:
        external_message_id:
          type: string
        sender_type:
          type: string
          enum: [buyer, seller, customer_service, system]
        content:
          type: string
        content_type:
          type: string
          enum: [text, image, video, file, mixed]
          default: text
        sent_at:
          type: string
          format: date-time
        raw_payload:
          $ref: "#/components/schemas/Metadata"

    ConversationContext:
      type: object
      required: [external_conversation_id, buyer_ref]
      properties:
        external_conversation_id:
          type: string
        buyer_ref:
          type: string
          description: 买家脱敏引用，不应传完整敏感身份。
        messages:
          type: array
          items:
            $ref: "#/components/schemas/IncomingMessage"
        raw_metadata:
          $ref: "#/components/schemas/Metadata"

    InitialContext:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductSnapshot"
        orders:
          type: array
          items:
            $ref: "#/components/schemas/OrderSnapshot"
        logistics:
          type: array
          items:
            $ref: "#/components/schemas/LogisticsSnapshot"
        rules:
          type: array
          items:
            $ref: "#/components/schemas/RuleSnapshot"

    ProductContextRefillRequest:
      allOf:
        - $ref: "#/components/schemas/ContextRefillBase"
        - type: object
          required: [products]
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/ProductSnapshot"

    OrderContextRefillRequest:
      allOf:
        - $ref: "#/components/schemas/ContextRefillBase"
        - type: object
          required: [orders]
          properties:
            orders:
              type: array
              items:
                $ref: "#/components/schemas/OrderSnapshot"

    LogisticsContextRefillRequest:
      allOf:
        - $ref: "#/components/schemas/ContextRefillBase"
        - type: object
          required: [logistics]
          properties:
            logistics:
              type: array
              items:
                $ref: "#/components/schemas/LogisticsSnapshot"

    RuleContextRefillRequest:
      allOf:
        - $ref: "#/components/schemas/ContextRefillBase"
        - type: object
          required: [rules]
          properties:
            rules:
              type: array
              items:
                $ref: "#/components/schemas/RuleSnapshot"

    ContextRefillBase:
      type: object
      required: [context_request_id, idempotency_key, captured_at]
      properties:
        context_request_id:
          type: string
          description: 来自 `context_requests[]` 的补上下文请求 ID。
        idempotency_key:
          type: string
          description: 补上下文幂等键；服务端按 `decision_id + context_request_id + idempotency_key` 去重。
        captured_at:
          type: string
          format: date-time
        metadata:
          $ref: "#/components/schemas/Metadata"

    ContextRefillResponse:
      type: object
      required: [decision_id, context_request_id, decision_status, accepted, remaining_context_requests, next_action]
      properties:
        decision_id:
          type: string
        context_request_id:
          type: string
        decision_status:
          $ref: "#/components/schemas/DecisionStatus"
        accepted:
          type: boolean
        remaining_context_requests:
          type: array
          items:
            $ref: "#/components/schemas/ContextRequestSummary"
        next_action:
          type: string
          enum: [wait_context, decide, action_request, candidate, handoff]
        trace:
          $ref: "#/components/schemas/DecisionTrace"

    ActionResultRequest:
      type: object
      required: [action_id, action_type, idempotency_key, status, executed_at]
      properties:
        action_id:
          type: string
        action_type:
          type: string
          examples: [update-note]
        idempotency_key:
          type: string
          description: 动作结果幂等键，避免重复备注、重复改地址等副作用。
        status:
          $ref: "#/components/schemas/ActionResultStatus"
        external_result:
          $ref: "#/components/schemas/Metadata"
        error:
          anyOf:
            - $ref: "#/components/schemas/ErrorDetail"
            - type: "null"
        executed_at:
          type: string
          format: date-time

    ActionResultResponse:
      type: object
      required: [decision_id, action_id, accepted, decision_status, next_action]
      properties:
        decision_id:
          type: string
        action_id:
          type: string
        accepted:
          type: boolean
        decision_status:
          $ref: "#/components/schemas/DecisionStatus"
        next_action:
          type: string
          enum: [decide, candidate, handoff, wait_action_result]
        trace:
          $ref: "#/components/schemas/DecisionTrace"

    HumanReplyFeedbackRequest:
      type: object
      required: [decision_id, human_reply, used_candidate, resolution_status]
      properties:
        decision_id:
          type: string
        message_id:
          type: string
        human_reply:
          type: string
        used_candidate:
          type: boolean
        adopted_suggestion_id:
          type:
            - string
            - "null"
        edit_distance:
          type:
