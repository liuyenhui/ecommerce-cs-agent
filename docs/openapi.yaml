            type: boolean
            default: false
        - name: reason
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 单条系统后台消息追踪详情。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemMessageTraceResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
