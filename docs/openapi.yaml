      enum: [queued, running, waiting_context, completed, failed, retrying, canceled, dead_lettered]

    WebhookEventType:
      type: string
      enum: [reply_decision.completed, reply_decision.failed, knowledge_entry.created, feedback.processed]

    WebhookSigningAlgorithm:
      type: string
      enum: [hmac-sha256]
      description: 使用订阅 secret 对 `{timestamp}.{event_id}.{raw_body_sha256}` 计算 HMAC-SHA256，放入 `X-Agent-Signature`。

    WebhookSubscriptionStatus:
      type: string
      enum: [active, paused, disabled, deleted]

    ConnectorStatus:
      type: string
      enum: [draft, active, paused, disabled]

    RuleReleaseStatus:
      type: string
      enum: [draft, dry_run_passed, canary, active, paused, rolled_back, archived]

    Metadata:
      type: object
      additionalProperties: true
