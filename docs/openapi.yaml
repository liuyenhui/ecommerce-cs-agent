      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/LlmConfigVersion"}
        page_info: {$ref: "#/components/schemas/LlmPageInfo"}

    LlmPageInfo:
      type: object
      additionalProperties: false
      description: Cursor pagination metadata. next_cursor resumes after an exclusive boundary and is an HMAC-SHA256 signed opaque token bound to its resource type and normalized scope. Reuse requires the same organization for configuration versions or release records and the same filters for invocation usage; callers must not decode or modify it. Unsigned, tampered, cross-resource, invalid, or mismatched-scope reuse returns 422.
      required: [limit, has_more, next_cursor]
      properties:
        limit: {type: integer, minimum: 1, maximum: 500}
        has_more: {type: boolean}
        next_cursor:
          type: [string, "null"]
          maxLength: 1024
          description: Cursor for the next page; null means there is no next page.

    LlmUsageSummary:
      type: object
