    ReplyDecisionCreateRequest:
      type: object
      required: [request_id, platform, external_store_id, message, conversation, mode]
      properties:
        request_id:
          type: string
          description: 外部请求幂等键。
        platform:
          $ref: "#/components/schemas/Platform"
        external_store_id:
          type: string
          description: 外部平台店铺 ID，例如 PDD mallId；与 API Key / Connector Token 授权范围共同解析内部 store_id。
