            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfigVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/system-admin/llm/config-versions/{version_id}/rollback:
    post:
      tags: [System Admin LLM Governance]
      operationId: rollbackSystemAdminLlmConfig
      summary: 从发布历史创建受审计回滚版本
      description: super_admin 或 release_admin 从运行中或终态历史复制新版本并发布；不删除、不改写原版本和原 release_record。
      x-roles: [super_admin, release_admin]
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/LlmVersionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LlmRollbackRequest"
            example:
              reason: provider regression requires an audited rollback
              idempotency_key: config-rollback-001
      responses:
        "200":
          description: 新回滚版本已成为运行版本。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmConfigVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/system-admin/llm/usage/summary:
    get:
      tags: [System Admin LLM Governance]
      operationId: getSystemAdminLlmUsageSummary
      summary: 查询调用与成本汇总
      description: 基于真实调用元数据聚合；混合币种时 estimated_cost_micros 为 null，并使用 cost_by_currency 分币种返回。
      x-roles: [super_admin, release_admin, technical_support, security_auditor]
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/LlmUsageStartAt"
        - $ref: "#/components/parameters/LlmUsageEndAt"
        - $ref: "#/components/parameters/LlmUsageProviderConfigId"
        - $ref: "#/components/parameters/LlmUsageModel"
        - $ref: "#/components/parameters/LlmUsageScenario"
        - $ref: "#/components/parameters/LlmUsageOrganizationId"
        - $ref: "#/components/parameters/LlmUsageStoreId"
        - $ref: "#/components/parameters/LlmUsageCurrency"
        - $ref: "#/components/parameters/LlmUsageStatus"
        - $ref: "#/components/parameters/LlmUsageRouteRole"
      responses:
        "200":
          description: 汇总指标；无调用时 calls 和 Token 为 0，比率为 null。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmUsageSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/system-admin/llm/usage/timeseries:
    get:
      tags: [System Admin LLM Governance]
      operationId: getSystemAdminLlmUsageTimeseries
      summary: 查询按小时调用时间序列
      description: 每个时间桶按币种分行；无真实调用时 items 为空，不生成示例曲线。
      x-roles: [super_admin, release_admin, technical_support, security_auditor]
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/LlmUsageStartAt"
        - $ref: "#/components/parameters/LlmUsageEndAt"
        - $ref: "#/components/parameters/LlmUsageProviderConfigId"
        - $ref: "#/components/parameters/LlmUsageModel"
        - $ref: "#/components/parameters/LlmUsageScenario"
        - $ref: "#/components/parameters/LlmUsageOrganizationId"
        - $ref: "#/components/parameters/LlmUsageStoreId"
        - $ref: "#/components/parameters/LlmUsageCurrency"
        - $ref: "#/components/parameters/LlmUsageStatus"
        - $ref: "#/components/parameters/LlmUsageRouteRole"
      responses:
        "200":
          description: 时间序列。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmUsageTimeseriesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/system-admin/llm/usage/breakdown:
    get:
      tags: [System Admin LLM Governance]
      operationId: getSystemAdminLlmUsageBreakdown
      summary: 查询调用成本维度分布
      description: 按 Provider、模型、场景、组织、店铺、状态或安全错误码分组，每组继续按币种拆分。
      x-roles: [super_admin, release_admin, technical_support, security_auditor]
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/LlmUsageStartAt"
        - $ref: "#/components/parameters/LlmUsageEndAt"
        - $ref: "#/components/parameters/LlmUsageProviderConfigId"
        - $ref: "#/components/parameters/LlmUsageModel"
        - $ref: "#/components/parameters/LlmUsageScenario"
        - $ref: "#/components/parameters/LlmUsageOrganizationId"
        - $ref: "#/components/parameters/LlmUsageStoreId"
        - $ref: "#/components/parameters/LlmUsageCurrency"
        - $ref: "#/components/parameters/LlmUsageStatus"
        - $ref: "#/components/parameters/LlmUsageRouteRole"
        - name: group_by
          in: query
          required: true
          schema: {type: string, enum: [provider, model, scenario, organization, store, status, error_code]}
      responses:
        "200":
          description: 分布列表。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmUsageBreakdownResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/system-admin/llm/usage/invocations:
    get:
      tags: [System Admin LLM Governance]
      operationId: listSystemAdminLlmInvocations
      summary: 查询脱敏调用明细
      description: 仅返回调用 ID、模型维度、Token、耗时、状态和估算成本，不返回 Prompt、客户消息或模型回复。
      x-roles: [super_admin, release_admin, technical_support, security_auditor]
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/LlmUsageStartAt"
        - $ref: "#/components/parameters/LlmUsageEndAt"
        - $ref: "#/components/parameters/LlmUsageProviderConfigId"
        - $ref: "#/components/parameters/LlmUsageModel"
        - $ref: "#/components/parameters/LlmUsageScenario"
        - $ref: "#/components/parameters/LlmUsageOrganizationId"
        - $ref: "#/components/parameters/LlmUsageStoreId"
        - $ref: "#/components/parameters/LlmUsageCurrency"
        - $ref: "#/components/parameters/LlmUsageStatus"
        - $ref: "#/components/parameters/LlmUsageRouteRole"
        - name: limit
          in: query
          schema: {type: integer, minimum: 1, maximum: 500, default: 100}
        - name: cursor
          in: query
          description: HMAC-SHA256 signed opaque cursor for the exclusive page boundary. Reuse only for invocation records with the same normalized usage filters; unsigned, tampered, cross-resource, invalid, or mismatched-scope cursors return 422.
          schema: {type: string, minLength: 1, maxLength: 1024}
      responses:
        "200":
          description: 脱敏调用明细。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LlmInvocationListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    AgentApiAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key or Connector Token
      description: 外部系统接入凭据，只能调用外部决策、补上下文、动作结果和反馈接口，不能调用客户 Admin 或系统 Admin API。Connector Token 调用 `POST /v1/reply-decisions` 时必须带有效 `billing_lease`。
    OpenErpIntegrationAuth:
      type: http
      scheme: bearer
      bearerFormat: Service Token
      description: open_erp_agent 服务间 provisioning 凭据，只能调用 `/v1/integrations/open-erp/*`，不能调用 Admin API，也不能替代 Connector Token 调用决策接口。
    AdminSession:
      type: apiKey
      in: cookie
      name: agent_admin_session
      description: 客户 Admin HttpOnly session cookie。session 状态必须落外部持久化存储，不能依赖单容器内存。
    SystemAdminSession:
      type: apiKey
      in: cookie
      name: agent_system_admin_session
      description: 系统 Admin HttpOnly session cookie。不能用于客户 Admin 或外部系统 API。

  parameters:
    LlmUsageStartAt:
      name: start_at
      in: query
      schema: {type: string, format: date-time}
    LlmUsageEndAt:
      name: end_at
      in: query
      schema: {type: string, format: date-time}
    LlmUsageProviderConfigId:
      name: provider_config_id
      in: query
      schema: {type: string, format: uuid}
    LlmUsageModel:
      name: model
      in: query
      schema: {type: string, maxLength: 128}
    LlmUsageScenario:
      name: scenario
      in: query
      schema: {type: string, maxLength: 64}
    LlmUsageOrganizationId:
      name: organization_id
      in: query
      schema: {type: string, format: uuid}
    LlmUsageStoreId:
      name: store_id
      in: query
      schema: {type: string, format: uuid}
    LlmUsageCurrency:
      name: currency
      in: query
      schema: {type: string, enum: [CNY, USD]}
    LlmUsageStatus:
      name: status
      in: query
      schema: {type: string, enum: [succeeded, failed, timed_out, rejected]}
    LlmUsageRouteRole:
      name: route_role
      in: query
      schema: {type: string, enum: [primary, fallback]}
    DecisionId:
      name: decision_id
      in: path
      required: true
      schema:
        type: string
      description: Agent 决策 ID；同时映射内部 LangGraph `thread_id`。
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
      description: 异步任务 ID。
    SubscriptionId:
      name: subscription_id
      in: path
      required: true
      schema:
        type: string
      description: Webhook 订阅 ID。
    ConnectorId:
      name: connector_id
      in: path
      required: true
      schema:
        type: string
      description: Connector 配置 ID。
    RuleSetId:
      name: rule_set_id
      in: path
      required: true
      schema:
        type: string
      description: 规则版本集合 ID。
    TenantIdQuery:
      name: tenant_id
      in: query
      required: false
      schema:
        type: string
      description: 租户 ID。客户 Admin 查询时必须属于当前 session 可访问范围；系统 Admin 跨租户查询会写访问审计。
    SystemOrganizationIdQuery:
      name: organization_id
      in: query
      required: false
      schema:
        type: string
        maxLength: 256
      description: Agent 组织外部 ID；System Admin 跨组织查询会写访问审计。
    StoreIdQuery:
      name: store_id
      in: query
      required: false
      schema:
        type: string
      description: 店铺 ID。与 `tenant_id` 同时提供时必须匹配。
    StatusQuery:
      name: status
      in: query
      required: false
      schema:
        type: string
      description: 状态筛选，枚举值由对应资源定义。
    RoleQuery:
      name: role
      in: query
      required: false
      schema:
        type: string
      description: 角色筛选。
    TimeFrom:
      name: created_at_from
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: 创建时间起点，闭区间。
    TimeTo:
      name: created_at_to
      in: query
      required: false
      schema:
        type: string
        format: date-time
      description: 创建时间终点，闭区间。
    LlmVersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: LLM 配置版本 ID。
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 统一页码分页参数，从 1 开始。
    PageSize:
      name: page_size
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 统一每页数量，默认 20，最大 100。

  responses:
    ContextRefillAccepted:
      description: 上下文已接收并聚合同一决策。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ContextRefillResponse"
    BadRequest:
      description: 请求格式错误或业务前置条件不满足。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: 未登录、凭据缺失或凭据无效。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: 已认证但没有访问当前租户、店铺、角色或排障数据的权限。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: 资源不存在或不属于当前租户 / 店铺上下文。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    IdempotencyConflict:
      description: 幂等键重复但请求载荷与首次请求不一致。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: 资源状态冲突、唯一约束冲突或业务版本冲突。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: 字段校验失败。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ObjectStorageUnavailable:
      description: 对象存储暂不可用；服务端不得回显底层凭据、临时 URL 或完整文件内容。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: 依赖服务未启用、配置缺失或暂不可用；响应不得回显凭据或 Secret。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    TooManyRequests:
      description: 请求过于频繁或触发登录 / API 限流。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: 服务端内部错误。响应不得包含密钥、请求头、Cookie 或完整 raw payload。
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    LlmSecretReference:
      type: object
      additionalProperties: false
      required: [namespace, name, key]
      description: Kubernetes Secret 定位引用；接口、数据库和审计均不得读取或返回对应值。
      properties:
        namespace: {type: string, minLength: 1, maxLength: 63, pattern: "^[a-z0-9](?:[-a-z0-9]{0,61}[a-z0-9])?(?![\\s\\S])"}
        name: {type: string, minLength: 1, maxLength: 253, pattern: "^[a-z0-9](?:[-a-z0-9]{0,61}[a-z0-9])?(?:\\.[a-z0-9](?:[-a-z0-9]{0,61}[a-z0-9])?)*(?![\\s\\S])"}
        key: {type: string, minLength: 1, maxLength: 253, pattern: "^[A-Za-z0-9._-]+(?![\\s\\S])"}

    LlmProviderCreateRequest:
      type: object
      additionalProperties: false
      required: [name, provider_type, base_url, secret_ref, reason, idempotency_key]
      properties:
        name: {type: string, minLength: 1, maxLength: 128}
        provider_type: {type: string, enum: [openai, openai_compatible, anthropic, azure_openai]}
        base_url: {type: string, format: uri, minLength: 1, maxLength: 2048, pattern: "^https://"}
        secret_ref: {$ref: "#/components/schemas/LlmSecretReference"}
        enabled: {type: boolean, default: true}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmProviderUpdateRequest:
      type: object
      additionalProperties: false
      required: [expected_revision, reason, idempotency_key]
      anyOf:
        - required: [name]
        - required: [enabled]
      properties:
        expected_revision: {type: integer, minimum: 1, maximum: 2147483647}
        name: {type: string, minLength: 1, maxLength: 128}
        enabled: {type: boolean}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmProvider:
      type: object
      additionalProperties: false
      required: [provider_id, name, provider_type, base_url, secret_ref, enabled, status, revision, created_at, updated_at]
      properties:
        provider_id: {type: string, format: uuid}
        name: {type: string}
        provider_type: {type: string, enum: [openai, openai_compatible, anthropic, azure_openai]}
        base_url: {type: string, format: uri}
        secret_ref: {$ref: "#/components/schemas/LlmSecretReference"}
        enabled: {type: boolean}
        status: {type: string, enum: [active, disabled, unhealthy]}
        last_connection_test_status: {type: [string, "null"], enum: [passed, failed, null]}
        last_connection_test_latency_ms: {type: [integer, "null"], minimum: 0}
        last_connection_test_error_code: {type: [string, "null"]}
        last_connection_tested_at: {type: [string, "null"], format: date-time}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        revision: {type: integer, minimum: 1}

    LlmProviderListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/LlmProvider"}

    LlmConnectionTestRequest:
      type: object
      additionalProperties: false
      required: [config_version_id, reason, idempotency_key]
      properties:
        config_version_id: {type: string, format: uuid}
        timeout_seconds: {type: integer, minimum: 1, maximum: 20, default: 20}
        max_tokens: {type: integer, minimum: 1, maximum: 256, default: 256}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmConnectionTest:
      type: object
      additionalProperties: false
      required: [connection_test_id, provider_config_id, config_version_id, provider_revision, status, latency_ms, checked_at]
      properties:
        connection_test_id: {type: string, format: uuid}
        provider_config_id: {type: string, format: uuid}
        config_version_id: {type: string, format: uuid}
        provider_revision: {type: integer, minimum: 1}
        status: {type: string, enum: [passed, failed]}
        latency_ms: {type: integer, minimum: 0}
        checked_at: {type: string, format: date-time}
        error_code: {type: [string, "null"]}
        redacted_error_message: {type: [string, "null"]}

    LlmConfigDraftCreateRequest:
      type: object
      additionalProperties: false
      required: [organization_id, reason, idempotency_key]
      properties:
        organization_id: {type: string, format: uuid}
        description: {type: [string, "null"], maxLength: 512}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmScenarioRoute:
      type: object
      additionalProperties: false
      required: [scenario, primary_provider_config_id, primary_model, enabled, temperature, max_output_tokens, timeout_seconds, max_retries, circuit_breaker_threshold, recovery_probe_seconds]
      properties:
        scenario: {type: string, minLength: 1, maxLength: 64}
        primary_provider_config_id: {type: string, format: uuid}
        primary_model: {type: string, minLength: 1, maxLength: 128}
        fallback_provider_config_id:
          oneOf: [{type: string, format: uuid}, {type: "null"}]
        fallback_model: {type: [string, "null"], minLength: 1, maxLength: 128}
        enabled: {type: boolean}
        temperature: {type: number, minimum: 0, maximum: 2}
        max_output_tokens: {type: integer, minimum: 1, maximum: 1000000}
        timeout_seconds: {type: integer, minimum: 1, maximum: 300}
        max_retries: {type: integer, minimum: 0, maximum: 20}
        circuit_breaker_threshold: {type: integer, minimum: 1, maximum: 10000}
        recovery_probe_seconds: {type: integer, minimum: 1, maximum: 86400}

    LlmScenarioRouteView:
      type: object
      additionalProperties: false
      required: [scenario, primary_provider_config_id, primary_model, enabled, temperature, max_output_tokens, timeout_seconds, max_retries, circuit_breaker_threshold, recovery_probe_seconds]
      properties:
        route_id: {type: string, format: uuid}
        scenario: {type: string}
        primary_provider_config_id: {type: string, format: uuid}
        primary_model: {type: string}
        fallback_provider_config_id:
          oneOf: [{type: string, format: uuid}, {type: "null"}]
        fallback_model: {type: [string, "null"]}
        enabled: {type: boolean}
        temperature: {type: number, minimum: 0, maximum: 2}
        max_output_tokens: {type: integer, minimum: 1}
        timeout_seconds: {type: integer, minimum: 1}
        max_retries: {type: integer, minimum: 0}
        circuit_breaker_threshold: {type: integer, minimum: 1}
        recovery_probe_seconds: {type: integer, minimum: 1}
        revision: {type: integer, minimum: 1}

    LlmRoutesReplaceRequest:
      type: object
      additionalProperties: false
      required: [routes, expected_revision, reason, idempotency_key]
      properties:
        routes:
          type: array
          minItems: 1
          maxItems: 32
          items: {$ref: "#/components/schemas/LlmScenarioRoute"}
        expected_revision: {type: integer, minimum: 1, maximum: 2147483647}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmRevisionWriteRequest:
      type: object
      additionalProperties: false
      required: [expected_revision, reason, idempotency_key]
      properties:
        expected_revision: {type: integer, minimum: 1, maximum: 2147483647}
        reason: {type: string, minLength: 1, maxLength: 512}
        idempotency_key: {type: string, minLength: 1, maxLength: 128}

    LlmSubmitPublishRequest:
      type: object
      additionalProperties: false
      required: [expected_revision, evaluation_run_id, reason, idempotency_key]
      properties:
        expected_revision: {type: integer, minimum: 1, maximum: 2147483647}
