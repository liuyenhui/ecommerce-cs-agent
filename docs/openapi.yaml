      description: 技术支持按 `decision_id`、请求 ID、外部消息 ID、组织、店铺、平台和时间查询摘要。请求 raw payload 必须带 `reason`，并可能返回 `RAW_PAYLOAD_ACCESS_DENIED`。
      security:
        - SystemAdminSession: []
      parameters:
        - $ref: "#/components/parameters/SystemOrganizationIdQuery"
        - $ref: "#/components/parameters/StoreIdQuery"
        - name: decision_id
          in: query
          required: false
          schema:
            type: string
        - name: external_message_id
          in: query
          required: false
          schema:
            type: string
        - name: trace_id
          in: query
          required: false
          schema:
            type: string
          description: Trace step ID 或运行时 trace 内部 step_id，用于定位具体图节点。
        - name: include_raw_payload
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: 是否申请查看 raw payload；需要 `trace:raw_payload:read` 专门能力且必须提供 `reason`。
        - name: reason
          in: query
          required: false
          schema:
            type: string
          description: 跨组织排障、敏感字段查看或 raw payload 访问原因。
        - $ref: "#/components/parameters/TimeFrom"
        - $ref: "#/components/parameters/TimeTo"
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
      responses:
