imagePullSecrets: []

proxy:
  enabled: false
  httpProxy: ""
  httpsProxy: ""
  noProxy: ""

api:
  replicas: 1
  envFromSecret: ecommerce-cs-agent-runtime
  runtimeLlmSecretRef:
    name: ecommerce-cs-agent-llm-provider
    key: api-key
  serviceAccount:
    create: true
    name: ""
    automount: true
  secretAccess:
    enabled: true
    allowedSecretRefs:
      - name: ecommerce-cs-agent-llm-provider
        keys:
          - key: api-key
            allowedOrigins: []
  image:
    repository: ghcr.io/liuyenhui/ecommerce-cs-agent-api
    tag: dev
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  service:
    port: 8000
  ingress:
    enabled: false
    host: ""
    tlsSecretName: ""

admin:
  replicas: 1
  image:
    repository: ghcr.io/liuyenhui/ecommerce-cs-agent-admin
    tag: dev
    pullPolicy: IfNotPresent
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
  tmpVolume:
    enabled: true
  service:
    port: 8080
  customer:
    host: ""
  system:
    host: ""
  ingress:
    enabled: false
    tlsSecretName: ""

migration:
  enabled: true
  backoffLimit: 2
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
