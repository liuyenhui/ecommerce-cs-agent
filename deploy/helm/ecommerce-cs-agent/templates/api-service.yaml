apiVersion: v1
kind: Service
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ecommerce-cs-agent-api
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
