{{- $allowedSecretRefs := .Values.api.secretAccess.allowedSecretRefs }}
{{- if not $allowedSecretRefs }}
{{- fail "api.secretAccess.allowedSecretRefs must not be empty" }}
{{- end }}
{{- $secretResourceNames := list }}
{{- range $index, $secretRef := $allowedSecretRefs }}
{{- $secretName := required (printf "api.secretAccess.allowedSecretRefs[%d].name is required" $index) $secretRef.name }}
{{- if or (gt (len $secretName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$" $secretName)) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].name is invalid" $index) }}
{{- end }}
{{- if eq $secretName $.Values.api.envFromSecret }}
{{- fail "api.secretAccess.allowedSecretRefs must not include api.envFromSecret" }}
{{- end }}
{{- if not (kindIs "slice" $secretRef.keys) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys must be a non-empty list" $index) }}
{{- end }}
{{- if not $secretRef.keys }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys must not be empty" $index) }}
{{- end }}
{{- range $keyIndex, $secretKey := $secretRef.keys }}
{{- if or (not $secretKey) (gt (len $secretKey) 253) (not (regexMatch "^[A-Za-z0-9._-]+$" $secretKey)) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys[%d] is invalid" $index $keyIndex) }}
{{- end }}
{{- end }}
{{- $secretResourceNames = append $secretResourceNames $secretName }}
{{- end }}
{{- $secretResourceNames = uniq $secretResourceNames }}
{{- if .Values.api.secretAccess.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml $secretResourceNames | nindent 6 }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
subjects:
  - kind: ServiceAccount
    name: {{ include "ecommerce-cs-agent.apiServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
{{- end }}
