{{- $allowedSecretRefs := .Values.api.secretAccess.allowedSecretRefs }}
{{- if not $allowedSecretRefs }}
{{- fail "api.secretAccess.allowedSecretRefs must not be empty" }}
{{- end }}
{{- $runtimeLlmSecretName := .Values.api.runtimeLlmSecretRef.name }}
{{- $runtimeLlmSecretKey := .Values.api.runtimeLlmSecretRef.key }}
{{- if not (kindIs "string" $runtimeLlmSecretName) }}
{{- fail "api.runtimeLlmSecretRef.name is invalid" }}
{{- end }}
{{- if or (not $runtimeLlmSecretName) (gt (len $runtimeLlmSecretName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$" $runtimeLlmSecretName)) }}
{{- fail "api.runtimeLlmSecretRef.name is invalid" }}
{{- end }}
{{- if eq $runtimeLlmSecretName .Values.api.envFromSecret }}
{{- fail "api.runtimeLlmSecretRef must not use api.envFromSecret" }}
{{- end }}
{{- if not (kindIs "string" $runtimeLlmSecretKey) }}
{{- fail "api.runtimeLlmSecretRef.key is invalid" }}
{{- end }}
{{- if or (not $runtimeLlmSecretKey) (gt (len $runtimeLlmSecretKey) 253) (not (regexMatch "^[A-Za-z0-9._-]+$" $runtimeLlmSecretKey)) }}
{{- fail "api.runtimeLlmSecretRef.key is invalid" }}
{{- end }}
{{- $secretResourceNames := list }}
{{- $runtimeLlmTupleAllowed := false }}
{{- $nonRuntimeMissingOrigins := false }}
{{- range $index, $secretRef := $allowedSecretRefs }}
{{- $secretName := required (printf "api.secretAccess.allowedSecretRefs[%d].name is required" $index) $secretRef.name }}
{{- if or (gt (len $secretName) 253) (not (regexMatch "^[a-z0-9]([-a-z0-9.]*[a-z0-9])?$" $secretName)) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].name is invalid" $index) }}
{{- end }}
{{- if eq $secretName $.Values.api.envFromSecret }}
{{- fail "api.secretAccess.allowedSecretRefs must not include api.envFromSecret" }}
{{- end }}
{{- if not (kindIs "slice" $secretRef.keys) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys must be a non-empty list" $index) }}
{{- end }}
{{- if not $secretRef.keys }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys must not be empty" $index) }}
{{- end }}
{{- range $keyIndex, $keyBinding := $secretRef.keys }}
{{- if not (kindIs "map" $keyBinding) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys[%d] must be an origin binding" $index $keyIndex) }}
{{- end }}
{{- $secretKey := $keyBinding.key }}
{{- if or (not (kindIs "string" $secretKey)) (not $secretKey) (gt (len $secretKey) 253) (not (regexMatch "^[A-Za-z0-9._-]+$" $secretKey)) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys[%d].key is invalid" $index $keyIndex) }}
{{- end }}
{{- if not (kindIs "slice" $keyBinding.allowedOrigins) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys[%d].allowedOrigins must be a list" $index $keyIndex) }}
{{- end }}
{{- $isRuntimeTuple := and (eq $secretName $runtimeLlmSecretName) (eq $secretKey $runtimeLlmSecretKey) }}
{{- if $isRuntimeTuple }}
{{- $runtimeLlmTupleAllowed = true }}
{{- else if not $keyBinding.allowedOrigins }}
{{- $nonRuntimeMissingOrigins = true }}
{{- end }}
{{- range $originIndex, $origin := $keyBinding.allowedOrigins }}
{{- if or (not (kindIs "string" $origin)) (not (regexMatch "^https://(\\[[0-9A-Fa-f:]+\\]|[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?)(:[0-9]{1,5})?/?$" $origin)) }}
{{- fail (printf "api.secretAccess.allowedSecretRefs[%d].keys[%d].allowedOrigins[%d] is invalid" $index $keyIndex $originIndex) }}
{{- end }}
{{- end }}
{{- end }}
{{- $secretResourceNames = append $secretResourceNames $secretName }}
{{- end }}
{{- $secretResourceNames = uniq $secretResourceNames }}
{{- if not $runtimeLlmTupleAllowed }}
{{- fail "api.runtimeLlmSecretRef tuple must exist in allowedSecretRefs" }}
{{- end }}
{{- if $nonRuntimeMissingOrigins }}
{{- fail "api.secretAccess.allowedSecretRefs non-runtime keys require allowedOrigins" }}
{{- end }}
{{- if .Values.api.secretAccess.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml $secretResourceNames | nindent 6 }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
subjects:
  - kind: ServiceAccount
    name: {{ include "ecommerce-cs-agent.apiServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
{{- end }}
