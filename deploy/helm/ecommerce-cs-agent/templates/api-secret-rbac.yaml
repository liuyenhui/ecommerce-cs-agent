{{- $allowedSecretNames := .Values.api.secretAccess.allowedSecretNames }}
{{- if not $allowedSecretNames }}
{{- fail "api.secretAccess.allowedSecretNames must not be empty" }}
{{- end }}
{{- if not (has .Values.api.envFromSecret $allowedSecretNames) }}
{{- fail "api.secretAccess.allowedSecretNames must include api.envFromSecret" }}
{{- end }}
{{- range $secretName := $allowedSecretNames }}
{{- if not $secretName }}
{{- fail "api.secretAccess.allowedSecretNames must not contain empty names" }}
{{- end }}
{{- end }}
{{- if .Values.api.secretAccess.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      {{- toYaml $allowedSecretNames | nindent 6 }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
subjects:
  - kind: ServiceAccount
    name: {{ include "ecommerce-cs-agent.apiServiceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ecommerce-cs-agent.name" . }}-api-secret-reader
{{- end }}
