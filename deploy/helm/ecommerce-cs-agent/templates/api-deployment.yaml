apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ecommerce-cs-agent.name" . }}-api
  labels:
    {{- include "ecommerce-cs-agent.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: ecommerce-cs-agent-api
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecommerce-cs-agent-api
        app.kubernetes.io/component: api
        app.kubernetes.io/managed-by: flux
        app.kubernetes.io/part-of: ecommerce-cs-agent
    spec:
      serviceAccountName: {{ include "ecommerce-cs-agent.apiServiceAccountName" . }}
      automountServiceAccountToken: {{ .Values.api.serviceAccount.automount }}
      securityContext:
        {{- toYaml .Values.api.podSecurityContext | nindent 8 }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.api.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
          envFrom:
            - secretRef:
                name: {{ .Values.api.envFromSecret }}
          env:
            - name: LLM_GOVERNANCE_SECRET_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LLM_GOVERNANCE_ALLOWED_SECRET_REFS
              value: {{ toJson .Values.api.secretAccess.allowedSecretRefs | quote }}
            - name: LLM_GOVERNANCE_RUNTIME_LLM_SECRET_REF
              value: {{ toJson .Values.api.runtimeLlmSecretRef | quote }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.runtimeLlmSecretRef.name }}
                  key: {{ .Values.api.runtimeLlmSecretRef.key }}
            - name: LLM_CURSOR_SIGNING_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.cursorSigningSecretRef.name }}
                  key: {{ .Values.api.cursorSigningSecretRef.key }}
            - name: LLM_CREDENTIAL_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.api.credentialEncryptionSecretRef.name }}
                  key: {{ .Values.api.credentialEncryptionSecretRef.key }}
            - name: LLM_NODE_BINDING_ENABLED
              value: {{ .Values.api.llmNodeBindingEnabled | quote }}
            {{- if .Values.proxy.enabled }}
            - name: HTTP_PROXY
              value: {{ .Values.proxy.httpProxy | quote }}
            - name: HTTPS_PROXY
              value: {{ .Values.proxy.httpsProxy | quote }}
            - name: NO_PROXY
              value: {{ .Values.proxy.noProxy | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
          livenessProbe:
            httpGet:
              path: /health
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
