name: CodeQL

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "23 2 * * 1"

permissions:
  actions: read
  contents: read
  packages: read
  security-events: write

jobs:
  analyze:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"
          output: codeql-results
          upload: always
          upload-database: false

      - name: Fail on CodeQL alerts
        run: |
          alert_count="$(
            find codeql-results -name '*.sarif' -print0 \
              | xargs -0 jq '[.runs[].results[]?] | length' \
              | awk '{total += $1} END {print total + 0}'
          )"
          echo "CodeQL alert count: ${alert_count}"
          if [ "$alert_count" -gt 0 ]; then
            exit 1
          fi

  notify-blocked:
    name: Notify security gate blocked
    runs-on: ubuntu-latest
    needs:
      - analyze
    if: >-
      ${{
        always() &&
        needs.analyze.result == 'failure' &&
        (
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name == github.repository
        )
      }}
    steps:
      - name: Send blocked deployment email
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.SECURITY_NOTIFY_TO || '46164072@qq.com' }}
          subject: "[ecommerce-cs-agent] CI/CD security gate blocked"
          body: |
            CodeQL SAST failed and blocked the PR or deployment pipeline.

            Repository: ${{ github.repository }}
            Workflow: ${{ github.workflow }}
            Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Ref: ${{ github.ref }}
            SHA: ${{ github.sha }}
            Actor: ${{ github.actor }}
