name: Deploy Dev GitOps

on:
  workflow_dispatch:
    inputs:
      head_sha:
        description: Commit SHA whose published images should be deployed.
        required: true
        type: string
  workflow_run:
    workflows:
      - Publish Images
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-dev-gitops
  cancel-in-progress: false

jobs:
  update-gitops:
    name: Update GitOps Dev Values
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    env:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
      GITOPS_REPO: liuyenhui/fhg-gitops-repo
      VALUES_PATH: apps/overlays/dev/ecommerce-cs-agent/values.yaml
    outputs:
      head_sha: ${{ steps.tag.outputs.head_sha }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      gitops_commit: ${{ steps.commit.outputs.gitops_commit }}
    steps:
      - name: Resolve image tag
        id: tag
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_SHA_INPUT: ${{ inputs.head_sha }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            head_sha="$HEAD_SHA_INPUT"
          else
            head_sha="$WORKFLOW_RUN_HEAD_SHA"
          fi
          if [[ ! "$head_sha" =~ ^[0-9a-fA-F]{12,40}$ ]]; then
            echo "Invalid head_sha" >&2
            exit 1
          fi
          short_sha="${head_sha:0:12}"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Checkout GitOps repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ env.GITOPS_TOKEN }}
          path: gitops

      - name: Update dev image tags
        shell: bash
        working-directory: gitops
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import os
          import re

          path = Path(os.environ["VALUES_PATH"])
          tag = "${{ steps.tag.outputs.image_tag }}"
          text = path.read_text(encoding="utf-8")
          text = re.sub(r"(api:\n(?:  .*\n)*?    tag: )[-A-Za-z0-9_.]+", rf"\g<1>{tag}", text)
          text = re.sub(r"(admin:\n(?:  .*\n)*?    tag: )[-A-Za-z0-9_.]+", rf"\g<1>{tag}", text)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit and push GitOps update
        id: commit
        shell: bash
        working-directory: gitops
        run: |
          set -euo pipefail
          if git diff --quiet -- "$VALUES_PATH"; then
            echo "GitOps values already reference ${{ steps.tag.outputs.image_tag }}"
            echo "gitops_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$VALUES_PATH"
          git commit -m "Deploy ecommerce-cs-agent ${{ steps.tag.outputs.image_tag }} to dev"
          echo "gitops_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          git push origin HEAD:main

  verify-dev:
    name: Verify Dev Release Gate
    runs-on: ubuntu-latest
    needs:
      - update-gitops
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize release gate report
        shell: bash
        run: |
          mkdir -p reports/release-gate
          cat > reports/release-gate/dev-release-gate.md <<'EOF'
          # Dev Release Gate Report: FAIL

          Release gate did not complete. Check the workflow logs before trusting this deployment.
          EOF

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python project
        run: python -m pip install -e ".[dev]"

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        shell: bash
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          set -euo pipefail
          if [[ -z "${KUBECONFIG_CONTENT}" ]]; then
            echo "KUBECONFIG GitHub Secret is required for dev release gate verification." >&2
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          printf '%s' "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Run dev release gate
        run: |
          python scripts/run_dev_release_gate.py \
            --commit-sha "${{ needs.update-gitops.outputs.head_sha }}" \
            --image-tag "${{ needs.update-gitops.outputs.image_tag }}" \
            --gitops-commit "${{ needs.update-gitops.outputs.gitops_commit }}" \
            --output reports/release-gate/dev-release-gate.md

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dev-release-gate-${{ needs.update-gitops.outputs.image_tag }}
          path: reports/release-gate/dev-release-gate.md
          if-no-files-found: warn
