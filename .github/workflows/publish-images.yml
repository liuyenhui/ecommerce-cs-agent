name: Publish Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish, for example dev-20260616-1459
        required: true
        type: string
  push:
    branches:
      - main
      - "codex/publish-*"

permissions:
  contents: read
  packages: write
  security-events: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_NAMESPACE: liuyenhui
  ALIYUN_REGISTRY: registry.cn-beijing.aliyuncs.com
  ALIYUN_NAMESPACE: threepeople

jobs:
  prepare:
    name: Prepare Image Tags
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Resolve image tag
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_tag="${{ inputs.tag }}"
          elif [[ "${{ github.ref_name }}" == codex/publish-* ]]; then
            image_tag="${{ github.ref_name }}"
            image_tag="${image_tag#codex/publish-}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            image_tag="dev"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid image tag: $image_tag" >&2
            exit 1
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  verify:
    name: Tests And Helm Render
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ecommerce_cs_agent_test
          POSTGRES_USER: ecommerce_cs_agent
          POSTGRES_PASSWORD: ecommerce_cs_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce_cs_agent -d ecommerce_cs_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_DSN: postgresql://ecommerce_cs_agent:ecommerce_cs_agent@localhost:5432/ecommerce_cs_agent_test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install Admin Web dependencies
        working-directory: admin-web
        run: npm ci

      - name: Admin Web type check
        working-directory: admin-web
        run: npm test

      - name: Admin Web production build
        working-directory: admin-web
        run: npm run build

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Apply PostgreSQL migrations
        run: DATABASE_URL="$PG_DSN" python -m ecommerce_cs_agent.db.cli migrate

      - name: Run tests
        run: APP_ENV=test DATABASE_URL="$PG_DSN" pytest

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Helm lint
        run: helm lint deploy/helm/ecommerce-cs-agent -f deploy/helm/ecommerce-cs-agent/values-dev.yaml

      - name: Helm template
        run: |
          helm template ecommerce-cs-agent deploy/helm/ecommerce-cs-agent \
            -n ecommerce-cs-agent-dev \
            -f deploy/helm/ecommerce-cs-agent/values-dev.yaml

      - name: K8s security render check
        run: python scripts/check_k8s_security.py

  publish:
    name: Build And Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    env:
      ALIYUN_REGISTRY_USERNAME: ${{ secrets.ALIYUN_REGISTRY_USERNAME }}
      ALIYUN_REGISTRY_PASSWORD: ${{ secrets.ALIYUN_REGISTRY_PASSWORD }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ecommerce-cs-agent-api
            dockerfile: Dockerfile.api
          - component: admin
            image: ecommerce-cs-agent-admin
            dockerfile: admin-web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push GHCR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}

      - name: Generate Trivy SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
          format: sarif
          output: trivy-${{ matrix.component }}.sarif
          vuln-type: os,library
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.component }}.sarif
          category: trivy-${{ matrix.component }}

      - name: Generate image SBOM artifact
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
          format: cyclonedx
          output: sbom-${{ matrix.component }}.cdx.json
          exit-code: "0"

      - name: Upload image SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: image-sbom-${{ matrix.component }}-${{ needs.prepare.outputs.sha_tag }}
          path: sbom-${{ matrix.component }}.cdx.json
          if-no-files-found: error

      - name: Enforce image vulnerability gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
          format: table
          vuln-type: os,library
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Login to Aliyun registry
        if: ${{ env.ALIYUN_REGISTRY_USERNAME != '' && env.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/login-action@v4
        with:
          registry: ${{ env.ALIYUN_REGISTRY }}
          username: ${{ env.ALIYUN_REGISTRY_USERNAME }}
          password: ${{ env.ALIYUN_REGISTRY_PASSWORD }}

      - name: Build and push Aliyun
        if: ${{ env.ALIYUN_REGISTRY_USERNAME != '' && env.ALIYUN_REGISTRY_PASSWORD != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          sbom: true
          provenance: mode=max
          tags: |
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
            ${{ env.ALIYUN_REGISTRY }}/${{ env.ALIYUN_NAMESPACE }}/${{ matrix.image }}:deploy
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}
