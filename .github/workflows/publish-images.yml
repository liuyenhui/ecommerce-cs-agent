name: Publish Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish, for example dev-20260616-1459
        required: true
        type: string
  push:
    branches:
      - main
      - "codex/publish-*"

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: liuyenhui

jobs:
  prepare:
    name: Prepare Image Tags
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tags.outputs.image_tag }}
      sha_tag: ${{ steps.tags.outputs.sha_tag }}
    steps:
      - name: Resolve image tag
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            image_tag="${{ inputs.tag }}"
          elif [[ "${{ github.ref_name }}" == codex/publish-* ]]; then
            image_tag="${{ github.ref_name }}"
            image_tag="${image_tag#codex/publish-}"
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            image_tag="dev"
          else
            image_tag="sha-${GITHUB_SHA::12}"
          fi

          if [[ ! "$image_tag" =~ ^[A-Za-z0-9_.-]+$ ]]; then
            echo "Invalid image tag: $image_tag" >&2
            exit 1
          fi

          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

  verify:
    name: Tests And Helm Render
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: helm lint deploy/helm/ecommerce-cs-agent -f deploy/helm/ecommerce-cs-agent/values-dev.yaml

      - name: Helm template
        run: |
          helm template ecommerce-cs-agent deploy/helm/ecommerce-cs-agent \
            -n ecommerce-cs-agent-dev \
            -f deploy/helm/ecommerce-cs-agent/values-dev.yaml

  publish:
    name: Build And Push ${{ matrix.component }}
    runs-on: ubuntu-latest
    needs:
      - prepare
      - verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            image: ecommerce-cs-agent-api
            dockerfile: Dockerfile.api
          - component: admin
            image: ecommerce-cs-agent-admin
            dockerfile: admin-web/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.prepare.outputs.sha_tag }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.image }}
