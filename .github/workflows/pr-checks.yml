name: PR Checks

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: PR Checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: ecommerce_cs_agent_test
          POSTGRES_USER: ecommerce_cs_agent
          POSTGRES_PASSWORD: ecommerce_cs_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ecommerce_cs_agent -d ecommerce_cs_agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PG_DSN: postgresql://ecommerce_cs_agent:ecommerce_cs_agent@localhost:5432/ecommerce_cs_agent_test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: admin-web/package-lock.json

      - name: Install Admin Web dependencies
        working-directory: admin-web
        run: npm ci

      - name: Admin Web type check
        working-directory: admin-web
        run: npm test

      - name: Admin Web production build
        working-directory: admin-web
        run: npm run build

      - name: Admin image nginx config check
        run: |
          docker build -f admin-web/Dockerfile -t ecommerce-cs-agent-admin:nginx-check .
          docker run --rm ecommerce-cs-agent-admin:nginx-check nginx -t

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Ruby YAML parse
        run: |
          ruby -e 'require "yaml"; ARGV.each { |path| YAML.load_file(path); puts "YAML ok: #{path}" }' \
            docs/openapi.yaml \
            .github/workflows/codeql.yml \
            .github/workflows/pr-checks.yml \
            .github/workflows/publish-images.yml \
            .github/workflows/deploy-dev.yml

      - name: Install Python project
        run: python -m pip install -e ".[dev]"

      - name: Apply PostgreSQL migrations
        run: DATABASE_URL="$PG_DSN" python -m ecommerce_cs_agent.db.cli migrate

      - name: OpenAPI ref check
        run: python scripts/check_openapi_refs.py docs/openapi.yaml

      - name: Markdown link check
        run: python scripts/check_markdown_links.py .

      - name: Eval CLI unittest
        run: python -m unittest tests.evals.test_live_cli -v

      - name: Eval CLI help
        run: python -m evals.cli --help

      - name: Pytest
        run: APP_ENV=test DATABASE_URL="$PG_DSN" python -m pytest tests -q

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Helm lint and template
        run: |
          helm lint deploy/helm/ecommerce-cs-agent -f deploy/helm/ecommerce-cs-agent/values-dev.yaml
          helm template ecommerce-cs-agent deploy/helm/ecommerce-cs-agent \
            -n ecommerce-cs-agent-dev \
            -f deploy/helm/ecommerce-cs-agent/values-dev.yaml

      - name: K8s security render check
        run: python scripts/check_k8s_security.py

      - name: Git whitespace check
        run: git diff --check

      - name: Sensitive pattern scan
        run: python scripts/check_sensitive_patterns.py .
