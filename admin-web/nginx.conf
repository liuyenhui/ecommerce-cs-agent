map_hash_bucket_size 128;

map $host $admin_site {
  system-admin.ecommerce-cs-agent-dev.fcihome.com system;
  default customer;
}

server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location /health {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  location /v1/ {
    proxy_pass http://ecommerce-cs-agent-api:8000;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location ^~ /assets/ {
    try_files /$admin_site$uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location = /index.html {
    try_files /$admin_site/index.html =404;
    add_header Cache-Control "no-store";
  }

  location / {
    try_files /$admin_site$uri /$admin_site$uri/ /$admin_site/index.html =404;
    add_header Cache-Control "no-store";
  }
}
