<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Ecommerce CS Agent Admin</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #f5f7fa;
        color: #1f2937;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      main {
        width: min(720px, calc(100vw - 48px));
        background: #ffffff;
        border: 1px solid #d9e0e8;
        border-radius: 8px;
        padding: 32px;
        box-shadow: 0 8px 24px rgb(15 23 42 / 8%);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0;
        line-height: 1.7;
      }
      code {
        background: #eef2f7;
        border-radius: 4px;
        padding: 2px 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ecommerce CS Agent Admin</h1>
      <p>Admin shell is deployed. Full customer admin flows will be connected after the Agent API and data model are finalized.</p>
      <p>Health endpoint: <code>/health</code></p>
    </main>
  </body>
</html>
